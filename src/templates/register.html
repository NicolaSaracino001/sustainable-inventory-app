<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodLoop - Registrazione</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); display: flex; justify-content: center; align-items: center; height: 100vh; }
        .auth-card { background: white; padding: 50px 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); width: 100%; max-width: 420px; text-align: center; }
        .logo-img { height: 140px; width: auto; max-width: 100%; margin-bottom: 20px; mix-blend-mode: multiply; display: block; margin-left: auto; margin-right: auto; }
        h2 { color: #1e293b; margin-top: 0; margin-bottom: 30px; font-size: 24px; font-weight: 700; letter-spacing: -0.5px;}
        .input-group { text-align: left; margin-bottom: 20px; }
        .input-group label { display: block; font-size: 13px; font-weight: 600; color: #64748b; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;}
        input { width: 100%; padding: 14px 16px; border: 2px solid #e2e8f0; border-radius: 12px; font-family: 'Inter', sans-serif; font-size: 15px; box-sizing: border-box; outline: none; transition: all 0.3s; background: #f8fafc; }
        input:focus { border-color: #10b981; background: white; box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1); }
        .btn { width: 100%; background: #1e293b; color: white; padding: 16px; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; margin-top: 10px; }
        .btn:hover { background: #0f172a; transform: translateY(-2px); box-shadow: 0 8px 15px rgba(30, 41, 59, 0.2); }
        .register-box { margin-top: 30px; padding-top: 25px; border-top: 1px solid #f1f5f9; font-size: 14px; color: #64748b; }
        .link { color: #10b981; text-decoration: none; font-weight: 600; margin-left: 5px; }
        .link:hover { text-decoration: underline; color: #059669; }
        .flash-msg { padding: 14px; margin-bottom: 25px; border-radius: 10px; font-size: 14px; background-color: #fef2f2; color: #ef4444; border-left: 4px solid #ef4444; text-align: left; }
    </style>
</head>
<body>
    <div class="auth-card">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo FoodLoop" class="logo-img" onerror="this.style.display='none';">
        <h2>Configura il Ristorante</h2>
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="flash-msg">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}
        <form method="POST" action="{{ url_for('auth.register') }}">
            <div class="input-group">
                <label>Il tuo Nome e Cognome</label>
                <input type="text" name="full_name" placeholder="Es. Mario Rossi" required>
            </div>
            <div class="input-group">
                <label>Nome Ristorante</label>
                <input type="text" name="restaurant_name" required>
            </div>
            <div class="input-group">
                <label>Email Proprietario</label>
                <input type="email" name="email" required>
            </div>
            <div class="input-group">
                <label>Password Master</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn">Crea Account Owner</button>
        </form>
        <div class="register-box">
            Hai già configurato? <a href="{{ url_for('auth.login') }}" class="link">Vai al Login</a>
        </div>
    </div>
</body>
</html>
