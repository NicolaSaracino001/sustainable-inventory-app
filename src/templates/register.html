<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodLoop - Registrati</title>
    <link rel="icon" href="{{ url_for('static', filename='logo.png') }}? v=2" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #a3e635 0%, #16a34a 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box;
        }
        .auth-card {
            background: white; padding: 40px; border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15); width: 100%; max-width: 450px;
            text-align: center;
        }
        .logo-img { height: 80px; margin-bottom: 15px; border-radius: 18px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);}
        h2 { margin: 0 0 10px 0; color: #0f172a; font-size: 24px; font-weight: 700;}
        p { color: #64748b; font-size: 14px; margin-bottom: 30px; }
        .form-group { text-align: left; margin-bottom: 16px; }
        label { display: block; font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 6px; }
        input {
            width: 100%; padding: 12px 16px; border: 1px solid #e2e8f0;
            border-radius: 12px; font-family: 'Inter', sans-serif; font-size: 14px;
            outline: none; transition: all 0.2s; box-sizing: border-box; background: #f8fafc;
        }
        input:focus { border-color: #16a34a; background: white; box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.1); }
        .btn-primary {
            width: 100%; padding: 14px; border: none; border-radius: 12px; margin-top: 10px;
            background: linear-gradient(135deg, #16a34a 0%, #15803d 100%); color: white;
            font-size: 15px; font-weight: 600; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 15px rgba(22, 163, 74, 0.2); }
        .flash-msg { padding: 12px; margin-bottom: 20px; border-radius: 8px; font-size: 13px; background-color: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
        .link-alt { display: block; margin-top: 20px; color: #16a34a; text-decoration: none; font-size: 14px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="auth-card">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="FoodLoop" class="logo-img">
        <h2>Crea il tuo account</h2>
        <p>Inizia a gestire il tuo locale con Zero Sprechi.</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="flash-msg"><i data-lucide="alert-circle" style="width: 16px; vertical-align: middle;"></i> {{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('auth.register') }}" method="POST">
            <div class="form-group">
                <label>Nome Completo</label>
                <input type="text" name="full_name" placeholder="es. Mario Rossi" required>
            </div>
            <div class="form-group">
                <label>Nome del Locale</label>
                <input type="text" name="restaurant_name" placeholder="es. La Bella Napoli" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="es. mario@ristorante.it" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Crea una password sicura" required>
            </div>
            <button type="submit" class="btn-primary">
                <i data-lucide="user-plus" style="width: 18px;"></i> Registrati Ora
            </button>
        </form>
        <a href="{{ url_for('auth.login') }}" class="link-alt">Hai già un account? Accedi</a>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
