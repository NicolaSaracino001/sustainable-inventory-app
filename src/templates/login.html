<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.I.M. - Accesso</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* SFONDO A TEMA: Verde chiarissimo con pattern elegante */
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f0fdf4; 
            background-image: radial-gradient(#bbf7d0 2px, transparent 2px);
            background-size: 30px 30px;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        
        .auth-card { background: white; padding: 40px 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(16, 185, 129, 0.15); width: 100%; max-width: 400px; text-align: center; border: 1px solid #e2e8f0; position: relative; }
        
        /* LA MELA SORRIDENTE */
        .mascot { font-size: 65px; margin-top: -20px; margin-bottom: 5px; display: inline-block; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
        
        h2 { color: #1e293b; margin-top: 0; margin-bottom: 25px; font-size: 24px; font-weight: 700; }
        
        .input-group { text-align: left; margin-bottom: 15px; }
        .input-group label { display: block; font-size: 13px; font-weight: 600; color: #64748b; margin-bottom: 5px; }
        input { width: 100%; padding: 12px 15px; border: 2px solid #e2e8f0; border-radius: 10px; font-family: 'Inter', sans-serif; font-size: 15px; box-sizing: border-box; outline: none; transition: all 0.3s; }
        input:focus { border-color: #10b981; background-color: #f8fafc; }
        
        .btn { width: 100%; background: #5cb85c; color: white; padding: 14px; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.3s; margin-top: 10px; box-shadow: 0 4px 6px rgba(92, 184, 92, 0.2); }
        .btn:hover { background: #4cae4c; transform: translateY(-2px); box-shadow: 0 6px 12px rgba(92, 184, 92, 0.3); }
        
        /* SEZIONE REGISTRATI MIGLIORATA */
        .register-box { margin-top: 25px; padding-top: 20px; border-top: 1px solid #e2e8f0; font-size: 14px; color: #64748b; }
        .link { color: #3b82f6; text-decoration: none; font-weight: 600; margin-left: 5px; }
        .link:hover { text-decoration: underline; color: #2563eb; }
        
        .flash-msg { padding: 12px; margin-bottom: 20px; border-radius: 8px; font-size: 14px; background-color: #fef2f2; color: #ef4444; border-left: 4px solid #ef4444; text-align: left; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="mascot">🍎😊</div>
        
        <h2>Accedi a S.I.M.</h2>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="flash-msg">⚠️ {{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}
        
        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="input-group">
                <label>Email</label>
                <input type="email" name="email" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn">Accedi</button>
        </form>
        
        <div class="register-box">
            Non hai un account? <a href="{{ url_for('auth.register') }}" class="link">Registrati qui</a>
        </div>
    </div>
</body>
</html>
