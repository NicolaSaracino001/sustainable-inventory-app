<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodLoop - Accesso</title>
    
    <link rel="icon" href="{{ url_for('static', filename='logo.png') }}" type="image/png">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #10b981; --primary-dark: #059669; --bg-color: #f8fafc; --card-bg: #ffffff; --text-main: #1e293b; --text-muted: #64748b; }
        body { font-family: 'Inter', sans-serif; margin: 0; background-color: var(--bg-color); color: var(--text-main); display: flex; align-items: center; justify-content: center; min-height: 100vh; }

        .auth-container { background: var(--card-bg); width: 100%; max-width: 450px; padding: 50px 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); text-align: center; border: 1px solid #f1f5f9; }
        .logo-img { height: 70px; margin-bottom: 20px; mix-blend-mode: multiply; }
        
        .auth-container h2 { margin: 0 0 10px 0; font-size: 28px; font-weight: 800; color: var(--text-main); letter-spacing: -0.5px; }
        .auth-container p { color: var(--text-muted); font-size: 15px; margin-bottom: 30px; }

        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-group input { width: 100%; padding: 14px 15px; border: 2px solid #e2e8f0; border-radius: 12px; font-family: 'Inter', sans-serif; font-size: 15px; outline: none; transition: all 0.3s; box-sizing: border-box; background: #f8fafc; }
        .form-group input:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1); }

        .btn-auth { width: 100%; padding: 16px; border: none; border-radius: 12px; background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: white; font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.3s; margin-top: 10px; box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2); }
        .btn-auth:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(16, 185, 129, 0.3); }

        .auth-links { margin-top: 30px; font-size: 14px; color: var(--text-muted); font-weight: 500;}
        .auth-links a { color: var(--primary); text-decoration: none; font-weight: 700; transition: 0.2s;}
        .auth-links a:hover { color: var(--primary-dark); text-decoration: underline; }

        .flash-msg { padding: 14px; margin-bottom: 20px; border-radius: 10px; font-size: 14px; font-weight: 500; background-color: #fef2f2; color: #ef4444; border: 1px solid #fecaca; text-align: left;}
    </style>
</head>
<body>

    <div class="auth-container">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="FoodLoop Logo" class="logo-img" onerror="this.style.display='none';">
        <h2>Bentornato</h2>
        <p>Accedi per gestire il tuo ristorante.</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="flash-msg">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('auth.login') }}" method="POST">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="La tua email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="La tua password" required>
            </div>
            <button type="submit" class="btn-auth">Accedi a FoodLoop</button>
        </form>

        <div class="auth-links">
            Non hai ancora un account? <a href="{{ url_for('auth.register') }}">Registrati ora</a>
        </div>
    </div>

</body>
</html>
